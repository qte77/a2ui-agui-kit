---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Security job mirrors ldnmxx-hack's ci.yml (gitleaks + semgrep); the build job mirrors
# agenthud-agui-a2ui's ci.yml `check` job (typecheck + lint + test + build). Actions are
# SHA-pinned (repo policy: allowed_actions=selected + sha_pinning_required); the trailing
# comment tracks the tag.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: semgrep (SAST)
        run: |
          pip install --quiet semgrep
          semgrep scan --config p/typescript --error

  build:
    name: typecheck + lint + stylelint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Stylelint (flat-design gate)
        run: npm run stylelint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
