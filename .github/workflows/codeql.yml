---
# Mirrors agenthud-agui-a2ui/.github/workflows/codeql.yaml.
# https://github.blog/changelog/2025-10-28-upcoming-deprecation-of-codeql-action-v3/
name: "CodeQL"

on:
  push:
  schedule:
    - cron: '27 11 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      with:
        languages: javascript-typescript

    - name: Autobuild
      uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4

    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      with:
        output: sarif-results

    - name: Dismiss alerts with inline suppression comments
      uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e # v2.0.2
      with:
        sarif-id: ${{ steps.analyze.outputs.sarif-id }}
        sarif-file: sarif-results
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
...
